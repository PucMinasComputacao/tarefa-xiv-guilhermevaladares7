<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard de Filmes</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <header>
    <h1>📊 Dashboard de Filmes</h1>
  </header>
  <main>
    <a href="index.html" class="btn-back">← Voltar ao catálogo</a>
    <p id="message"></p>
    <div class="charts-grid">
      <div class="chart-card">
        <h2>Filmes por categoria</h2>
        <canvas id="chart-categoria"></canvas>
      </div>
      <div class="chart-card">
        <h2>Nota média por categoria</h2>
        <canvas id="chart-nota"></canvas>
      </div>
      <div class="chart-card chart-card-wide">
        <h2>Filmes por ano de lançamento</h2>
        <canvas id="chart-ano"></canvas>
      </div>
    </div>
  </main>
  <script src="graficos.js"></script>
</body>
</html>
